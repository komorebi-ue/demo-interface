name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  syntax:
    name: Syntax (compileall)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Byte-compile sources
        run: |
          python -m compileall -q common config pages tests utils
          python -m py_compile conftest.py

  test:
    name: Test (pytest + Playwright)
    runs-on: ubuntu-latest
    needs: syntax
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (Chromium + system deps)
        run: playwright install chromium --with-deps

      - name: Run pytest
        env:
          PYTHONUNBUFFERED: "1"
        run: python -m pytest

      - name: Upload Allure results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore
